# Fly.io config (PRD open question #2 — managed host recommended for public).
# Deploy: fly launch --copy-config --name empire36 && fly volumes create empire_data --size 1 && fly deploy
app = "empire36"
primary_region = "ewr"  # Newark. Obviously.

[build]

[env]
  PORT = "8136"
  EMPIRE_DB = "/data/empire.db"

[[mounts]]
  source = "empire_data"
  destination = "/data"

[http_service]
  internal_port = 8136
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
